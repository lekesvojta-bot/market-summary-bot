name: Market Summary

on:
  schedule:
    # Časy jsou v UTC a GitHub cron neřeší letní/zimní čas.
    # 06:05 / 11:05 / 18:05 UTC = cca 08:05 / 13:05 / 20:05 SELČ (letní čas, CEST, UTC+2).
    # V zimě (CET, UTC+1) tak přijdou zprávy o hodinu později (9:05/14:05/21:05).
    # Pokud to vadí, dvakrát ročně tu čísla uprav o 1.
    #
    # Minuta je schválně 5, ne 0: GitHub Actions varuje, že spouštění přesně
    # na celou hodinu je nejvytíženější čas a naplánovaný běh se pak může
    # zpozdit nebo úplně přeskočit (přesně to se stalo ranní zprávě 10.7.).
    - cron: "5 6 * * *"
    - cron: "5 11 * * *"
    - cron: "5 18 * * *"
  workflow_dispatch: {}

jobs:
  send-market-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Nastavit Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Nainstalovat závislosti
        run: pip install -r requirements.txt

      - name: Spustit bota
        run: python main.py
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
