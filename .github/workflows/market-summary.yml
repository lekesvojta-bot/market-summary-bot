name: Market Summary

on:
  schedule:
    # Časy jsou v UTC a GitHub cron neřeší letní/zimní čas.
    # 18:05 UTC = cca 20:05 SELČ (letní čas, CEST, UTC+2).
    # V zimě (CET, UTC+1) tak přijde zpráva o hodinu později (21:05).
    # Pokud to vadí, dvakrát ročně tu číslo uprav o 1.
    #
    # Minuta je schválně 5, ne 0: GitHub Actions varuje, že spouštění přesně
    # na celou hodinu je nejvytíženější čas a naplánovaný běh se pak může
    # zpozdit nebo úplně přeskočit (přesně to se stalo ranní zprávě 10.7.).
    #
    # Jednou denně večer (dřív to bylo 3x denně - ráno/odpoledne/večer).
    - cron: "5 18 * * *"
  workflow_dispatch: {}

# Workflow potřebuje právo zapisovat do repa, protože po každém běhu
# commitne čerstvá data pro webový dashboard (docs/data/).
permissions:
  contents: write

jobs:
  send-market-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Nastavit Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Nainstalovat závislosti
        run: pip install -r requirements.txt

      - name: Spustit bota
        run: python main.py
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commitnout data pro web
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          # Commit jen když se něco změnilo, jinak by git commit spadl.
          if git diff --cached --quiet; then
            echo "Žádná nová data ke commitnutí."
          else
            git commit -m "Data z běhu $(date -u +'%Y-%m-%d %H:%M') UTC"
            git push
          fi

      # Hlídací pes: když cokoliv výše selže, pošli prostou zprávu na Telegram,
      # ať se o problému ví hned a ne až podle chybějícího přehledu.
      - name: Upozornit na selhání
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=⚠️ Bot spadl, přehled trhu nedorazí. Log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
